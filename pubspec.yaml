name: talkdoraemon
version: 1.0.1+1
publish_to: none
description: A new Flutter project.
environment: 
  sdk: '>=3.4.1 <4.0.0'

dependencies: 
  cupertino_icons: ^1.0.6
  get: 4.6.6
  flutter: 
    sdk: flutter
  firebase_core: ^3.1.1
  rive: ^0.13.20
  flutter_screenutil: ^5.9.3
  infinite_carousel: ^1.1.1
  flutter_speed_dial: ^7.0.0
  flutter_sound: ^9.17.0
  audio_session: ^0.1.21
  permission_handler: ^11.3.1
  flutter_sound_platform_interface: ^9.17.0

dev_dependencies: 
  flutter_lints: 4.0.0
  flutter_test: 
    sdk: flutter
  flutter_launcher_icons: "^0.14.3"


flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/images/bg/
    - assets/images/
    - assets/images/gadgets/
    # - assets/rive/
    - assets/rive/foods/
    - assets/rive/doraemon/
    # - assets/svgs/

  fonts:
    - family: ComicSans
      fonts:
        - asset: assets/fonts/ComicSansMS3.ttf


# Add this at the end of your pubspec.yaml file
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/icon.png"
  min_sdk_android: 21
  web:
    generate: true
    image_path: "assets/images/icon.png"
    background_color: "#ffffff"
    theme_color: "#0175C2"
  windows:
    generate: true
    image_path: "assets/images/icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "assets/images/icon.png"